name: 🚀 Deploy to EC2 (Build on GitHub + PM2)

env:
  PRIVATE_KEY: ${{ secrets.AWS_DEV_SSH_KEYPEM }}

on:
  pull_request:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Checkout repository
        uses: actions/checkout@v3

      - name: 🔧 Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🔨 Build app
        run: npm run build
